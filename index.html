<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KixApp</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 50px;
    }
    input, button {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
    }
    button {
      background: green;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

  <h1>KixApp 💰</h1>

  <input type="text" id="phone" placeholder="+244..." />
  <div id="recaptcha"></div>
  <button onclick="sendCode()">Enviar Código</button>

  <br/>

  <input type="text" id="code" placeholder="Código SMS" />
  <button onclick="verifyCode()">Entrar</button>

  <script>
    const firebaseConfig = {
      apiKey: "COLOCA_AQUI",
      authDomain: "COLOCA_AQUI",
      projectId: "COLOCA_AQUI",
      appId: "COLOCA_AQUI"
    };

    firebase.initializeApp(firebaseConfig);

    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha');

    function sendCode() {
      const phoneNumber = document.getElementById('phone').value;

      firebase.auth().signInWithPhoneNumber(phoneNumber, window.recaptchaVerifier)
        .then((confirmationResult) => {
          window.confirmationResult = confirmationResult;
          alert("Código enviado!");
        }).catch((error) => {
          alert(error.message);
        });
    }

    function verifyCode() {
      const code = document.getElementById('code').value;

      confirmationResult.confirm(code).then((result) => {
        alert("Login feito com sucesso!");
      }).catch((error) => {
        alert("Código inválido");
      });
    }
  </script>

</body>
</html>
