<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KixApp</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px;
      background: #f5f5f5;
    }
    input, button {
      padding: 12px;
      margin: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      width: 80%;
      max-width: 300px;
    }
    button {
      background: green;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

  <h1>KixApp 💰</h1>

  <input type="text" id="phone" placeholder="+244..." />
  <div id="recaptcha"></div>
  <button onclick="sendCode()">Enviar Código</button>

  <br/>

  <input type="text" id="code" placeholder="Código SMS" />
  <button onclick="verifyCode()">Entrar</button>

  <script>
    const firebaseConfig = {
    apiKey: "AIzaSyBEtpw4g9lRVdcvMwPlOCy-ALidF1z5Qs8",
    authDomain: "kixapp-8120f.firebaseapp.com",
    projectId: "kixapp-8120f",
    storageBucket: "kixapp-8120f.firebasestorage.app",
    messagingSenderId: "59000901402",
    appId: "1:59000901402:web:a16aefc4381ae2e6bba6a3"
  };
    
    firebase.initializeApp(firebaseConfig);

    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha', {
  size: 'normal'
});

    function sendCode() {
      const phoneNumber = document.getElementById('phone').value;

      firebase.auth().signInWithPhoneNumber(phoneNumber, window.recaptchaVerifier)
        .then((confirmationResult) => {
          window.confirmationResult = confirmationResult;
          alert("Código enviado!");
        }).catch((error) => {
          alert(error.message);
        });
    }

    function verifyCode() {
      const code = document.getElementById('code').value;

      confirmationResult.confirm(code).then((result) => {
        alert("Login feito com sucesso!");
      }).catch((error) => {
        alert("Código inválido");
      });
    }
  </script>

</body>
</html>
